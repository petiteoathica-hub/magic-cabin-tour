<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>魔法の小屋探訪</title>
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <main class="cottage">
    <header class="cottage__header">
      <p class="cottage__eyebrow">魔法の小屋探訪</p>
      <h1 id="room-name" aria-live="polite">客間</h1>
    </header>

    <!--
      この部分がスワイプ／ドラッグできる舞台です。
      tabindex を付け、PCでは左右の矢印キーでも確認できるようにしています。
    -->
    <section
      id="room-stage"
      class="stage"
      tabindex="0"
      aria-label="部屋の切り替え。左右にスワイプ、ドラッグ、または矢印キーで操作できます。"
    >
      <!--
        正面と上下左右の5面だけを用意します。
        中身は、正面が切り替わるたびにJavaScriptで再抽選されます。
      -->
      <div id="room-cube" class="room-cube">
        <article class="room room--front" data-face="front" aria-label="客間">
          <span class="room__number">01</span>
          <h2>客間</h2>
          <p>旅人を迎える、灯りのやわらかな部屋</p>
        </article>

        <article class="room room--right" data-face="right"></article>
        <article class="room room--left" data-face="left"></article>
        <article class="room room--top" data-face="top"></article>
        <article class="room room--bottom" data-face="bottom"></article>
      </div>
    </section>

    <footer class="cottage__footer">
      <p>上下左右にスワイプ / ドラッグ</p>
      <div class="direction-mark" aria-hidden="true">
        <span class="direction-mark__dot direction-mark__dot--top"></span>
        <span class="direction-mark__dot direction-mark__dot--left"></span>
        <span class="direction-mark__dot direction-mark__dot--center"></span>
        <span class="direction-mark__dot direction-mark__dot--right"></span>
        <span class="direction-mark__dot direction-mark__dot--bottom"></span>
      </div>
    </footer>
  </main>

  <script src="./script.js"></script>
</body>
</html>
