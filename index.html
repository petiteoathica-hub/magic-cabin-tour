<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>魔法の小屋探訪</title>
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <main class="cottage">
    <header class="cottage__header">
      <p class="cottage__eyebrow">魔法の小屋探訪</p>
      <h1 id="room-name" aria-live="polite">客間</h1>
    </header>

    <!--
      この部分がスワイプ／ドラッグできる舞台です。
      tabindex を付け、PCでは左右の矢印キーでも確認できるようにしています。
    -->
    <section
      id="room-stage"
      class="stage"
      tabindex="0"
      aria-label="部屋の切り替え。左右にスワイプ、ドラッグ、または矢印キーで操作できます。"
    >
      <!-- 3つの部屋は、立方体の異なる面として固定されています -->
      <div id="room-cube" class="room-cube">
        <article class="room room--guest room--front" aria-label="客間">
          <span class="room__number">01</span>
          <h2>客間</h2>
          <p>旅人を迎える、灯りのやわらかな部屋</p>
        </article>

        <article class="room room--study room--right" aria-label="書斎">
          <span class="room__number">02</span>
          <h2>書斎</h2>
          <p>古い魔導書が静かに眠る部屋</p>
        </article>

        <article class="room room--workshop room--back" aria-label="工房">
          <span class="room__number">03</span>
          <h2>工房</h2>
          <p>不思議な道具が作られる部屋</p>
        </article>
      </div>
    </section>

    <footer class="cottage__footer">
      <p>左右にスワイプ / ドラッグ</p>
      <div class="dots" aria-hidden="true">
        <span class="dot is-active"></span>
        <span class="dot"></span>
        <span class="dot"></span>
      </div>
    </footer>
  </main>

  <script src="./script.js"></script>
</body>
</html>
